{% extends "base.html" %} {% block title %}Inscription{% endblock %} {% block
content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-5 border-0 shadow-sm">
      <div class="text-center mb-5">
        <div
          class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-3 mb-4"
          style="width: 64px; height: 64px"
        >
          <i class="fas fa-user-plus fa-xl text-success"></i>
        </div>
        <h3 class="fw-bold mb-1">Créer un compte</h3>
        <p class="text-muted small">Rejoignez-nous pour gérer vos demandes.</p>
      </div>

      <form action="{{ url_for('auth.register') }}" method="POST">
        <div class="mb-3">
          <label for="prenom" class="form-label small fw-bold">Prenom</label>
          <input
            type="text"
            class="form-control"
            id="prenom"
            name="prenom"
            placeholder="Seydou Kandji"
            required
          />
        </div>
        <div class="mb-3">
          <label for="nom" class="form-label small fw-bold">Nom</label>
          <input
            type="text"
            class="form-control"
            id="nom"
            name="nom"
            placeholder="Seydou Kandji"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label small fw-bold">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="user@test.com"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label small fw-bold"
            >Mot de passe</label
          >
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
        </div>
        <div class="mb-4">
          <label for="confirm_password" class="form-label small fw-bold"
            >Confirmer le mot de passe</label
          >
          <input
            type="password"
            class="form-control"
            id="confirm_password"
            name="confirm_password"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn btn-success w-100 py-2 mb-4">
          S'inscrire <i class="fas fa-check-circle ms-2"></i>
        </button>
      </form>
      <div class="text-center">
        <p class="text-muted small mb-0">
          Déjà un compte ?
          <a href="/login" class="text-primary text-decoration-none fw-semibold"
            >Se connecter</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
